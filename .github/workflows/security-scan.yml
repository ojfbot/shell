name: Security Scan

on: [push, pull_request]

jobs:
  secret-scan:
    name: Scan for Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        if: github.event_name != 'push' || github.event.before != '0000000000000000000000000000000000000000'
        uses: trufflesecurity/trufflehog@b6389e24199ff37a98a48f90b95d775af819a95d
        with:
          path: ./
          base: ${{ github.event_name == 'push' && github.event.before || github.event.repository.default_branch }}
          head: HEAD
          extra_args: --json

      - name: Check for API keys in code
        run: |
          echo "Checking for hardcoded API keys..."
          if git grep -E "sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{90,}" -- '*.ts' '*.js' '*.tsx' '*.jsx' '*.json' ':!*.example' ':!.github/workflows/security-scan.yml'; then
            echo "ERROR: API keys found in tracked files!"
            exit 1
          else
            echo "No API keys found in code"
          fi

      - name: Verify dist/ not committed
        run: |
          echo "Checking for dist/ artifacts..."
          if git ls-files | grep -E "dist/|build/" | grep -v "dist/README.md"; then
            echo "ERROR: Build artifacts found in git!"
            exit 1
          else
            echo "No build artifacts committed"
          fi

  dependency-audit:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone frame-ui-components (file protocol dep)
        run: git clone --depth 1 https://github.com/ojfbot/frame-ui-components.git ../frame-ui-components

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        continue-on-error: true
        run: |
          echo "Auditing production dependencies for vulnerabilities..."
          pnpm audit --prod --audit-level=high || echo "WARNING: vulnerabilities found (review above)"
