# Vercel deployment — replaces GitHub Pages deploy (ADR-0014).
#
# Required GitHub secrets (set after initial `npx vercel --prod` from local machine):
#   VERCEL_TOKEN       — vercel.com → Account Settings → Tokens
#   VERCEL_ORG_ID      — .vercel/project.json → orgId
#   VERCEL_PROJECT_ID  — .vercel/project.json → projectId
#
# On first deploy from local: cd shell && npx vercel --prod --yes
# This creates .vercel/project.json — copy the IDs into GitHub repo secrets.
#
# Production domain: frame.jim.software (set in Vercel project settings)

name: Deploy to Vercel

on: [push, pull_request]

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  IBM_TELEMETRY_DISABLED: 'true'

jobs:
  deploy:
    name: ${{ github.ref == 'refs/heads/main' && 'Production Deploy' || 'Preview Deploy' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone frame-ui-components (file protocol dep)
        run: git clone --depth 1 https://github.com/ojfbot/frame-ui-components.git ../frame-ui-components

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Resolve deploy flags
        id: flags
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "vercel_env=production" >> $GITHUB_OUTPUT
            echo "prod=--prod" >> $GITHUB_OUTPUT
          else
            echo "vercel_env=preview" >> $GITHUB_OUTPUT
            echo "prod=" >> $GITHUB_OUTPUT
          fi

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=${{ steps.flags.outputs.vercel_env }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build ${{ steps.flags.outputs.prod }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        id: deploy
        run: echo "url=$(vercel deploy --prebuilt ${{ steps.flags.outputs.prod }} --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT

      - name: Comment preview URL on PR
        if: github.ref != 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else {
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${context.ref.replace('refs/heads/', '')}`,
                state: 'open',
              });
              if (prs.data.length === 0) return;
              prNumber = prs.data[0].number;
            }
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `**Preview deployment ready**\n🔍 ${{ steps.deploy.outputs.url }}`
            });
