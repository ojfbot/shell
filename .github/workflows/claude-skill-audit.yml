name: Skill Audit

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  skill-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch telemetry snapshot
        id: telemetry
        continue-on-error: true
        run: |
          git fetch origin telemetry/daily 2>/dev/null || exit 0
          mkdir -p /tmp/telemetry
          git show origin/telemetry/daily:tool-telemetry.jsonl > /tmp/telemetry/tool-telemetry.jsonl 2>/dev/null || true
          git show origin/telemetry/daily:skill-telemetry.jsonl > /tmp/telemetry/skill-telemetry.jsonl 2>/dev/null || true
          git show origin/telemetry/daily:session-telemetry.jsonl > /tmp/telemetry/session-telemetry.jsonl 2>/dev/null || true
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Run skill audit
        run: |
          # The audit hook ships in core/scripts/hooks/ and is symlinked into
          # consumer repos by install-agents.sh. Symlinks are gitignored on
          # consumer repos, so they're not in fresh CI checkouts. If the hook
          # isn't here, this isn't core — skip with a notice instead of failing.
          if [[ ! -x ./scripts/hooks/pr-skill-audit.sh ]]; then
            echo "::notice::pr-skill-audit.sh not present in this repo (consumer-side install)"
            echo "::notice::Skipping skill audit. The hook lives in ojfbot/core; symlinked into consumers via install-agents.sh."
            mkdir -p /tmp
            cat > /tmp/skill-audit-report.md <<'EOF'
          _Skill audit skipped: this repo does not ship `scripts/hooks/pr-skill-audit.sh` directly. The hook lives in `ojfbot/core` and is symlinked into consumer repos by `install-agents.sh`. The symlink is gitignored, so it isn't present on a CI runner that only checks out this repo._
          EOF
            exit 0
          fi

          if [[ "${{ steps.telemetry.outputs.available }}" == "true" ]]; then
            MODE="both"
          else
            MODE="heuristic"
          fi
          bash scripts/hooks/pr-skill-audit.sh \
            --pr=${{ github.event.pull_request.number }} \
            --mode="$MODE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEMETRY_DIR: /tmp/telemetry

      - name: Post audit comment (upsert)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const BOT_MARKER = '<!-- skill-audit-results -->';

            let report;
            try {
              report = fs.readFileSync('/tmp/skill-audit-report.md', 'utf8');
            } catch {
              report = '_No audit report generated._';
            }

            const fullBody = BOT_MARKER + '\n' + report;

            const existing = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = existing.data.find(
              c => c.body && c.body.includes(BOT_MARKER)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: fullBody,
              });
            }
