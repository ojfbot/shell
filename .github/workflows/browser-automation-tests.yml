name: Browser Automation Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/shell-app/**'
      - 'packages/browser-automation/**'
      - 'docker-compose.ci.yml'
      - '.github/workflows/browser-automation-tests.yml'
  workflow_dispatch:

concurrency:
  group: browser-automation-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_ENV: test
  HEADLESS: true
  FORCE_COLOR: 1

jobs:
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup temp directories
        run: |
          mkdir -p temp/screenshots
          mkdir -p temp/test-results
          chmod -R 777 temp

      - name: Start services with Docker Compose
        id: docker-start
        run: |
          docker compose -f docker-compose.ci.yml up -d
          echo "Waiting for services to be ready..."
        continue-on-error: true

      - name: Wait for services
        id: wait-services
        if: steps.docker-start.outcome == 'success'
        run: |
          echo "Waiting for Shell app (http://localhost:4000)..."
          timeout 60 bash -c 'until curl -sf http://localhost:4000 > /dev/null; do sleep 2; done'

          echo "Waiting for browser-automation (http://localhost:4002/health)..."
          timeout 60 bash -c 'until curl -sf http://localhost:4002/health > /dev/null; do sleep 2; done'

          echo "All services are ready"
        continue-on-error: true

      - name: Show service logs (debug)
        if: steps.docker-start.outcome == 'failure' || steps.wait-services.outcome == 'failure'
        run: |
          docker compose -f docker-compose.ci.yml logs shell-app 2>/dev/null || true
          docker compose -f docker-compose.ci.yml logs browser-automation 2>/dev/null || true

      - name: Run visual regression tests
        id: visual-tests
        if: steps.wait-services.outcome == 'success'
        run: |
          docker compose -f docker-compose.ci.yml exec -T browser-automation pnpm test:visual
        env:
          API_URL: http://localhost:4002
          BROWSER_APP_URL: http://shell-app:4000
          UPDATE_BASELINES: 'false'
        continue-on-error: true

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots-${{ github.run_number }}
          path: temp/screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-${{ github.run_number }}
          path: |
            temp/test-results/visual-diffs/
            packages/browser-automation/test-baselines/**/diffs/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: temp/test-results/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const summaryPath = 'temp/test-results/pr-comment.md';
            let comment = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8')
              : '## Browser Automation Test Results\n\nTest report not generated. Check workflow logs.\n';

            const BOT_MARKER = '<!-- shell-browser-automation-results -->';
            const fullBody = BOT_MARKER + '\n' + comment;
            const existing = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const botComment = existing.data.find(c => c.body && c.body.includes(BOT_MARKER));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: fullBody,
              });
            }

      - name: Shutdown services
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down -v 2>/dev/null || true
          docker compose -f docker-compose.ci.yml rm -f 2>/dev/null || true

      - name: Check test results
        if: always()
        run: |
          if [ "${{ steps.docker-start.outcome }}" != "success" ] || [ "${{ steps.wait-services.outcome }}" != "success" ]; then
            echo "Docker services failed to start -- skipping test result check"
            exit 0
          fi
          if [ "${{ steps.visual-tests.outcome }}" != "success" ]; then
            echo "Visual regression tests did not pass (non-blocking pre-release)"
          fi
          echo "Visual regression tests complete"
