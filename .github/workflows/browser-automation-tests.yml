name: Browser Automation Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/shell-app/**'
      - 'packages/browser-automation/**'
      - 'docker-compose.ci.yml'
      - '.github/workflows/browser-automation-tests.yml'
  workflow_dispatch:

concurrency:
  group: browser-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-regression:
    name: Visual Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create output directories
        run: |
          mkdir -p temp/screenshots
          mkdir -p temp/test-results

      - name: Build and start services
        run: |
          docker compose -f docker-compose.ci.yml build
          docker compose -f docker-compose.ci.yml up -d

      - name: Wait for Shell app
        run: |
          echo "Waiting for Shell app to be healthy..."
          timeout 120 bash -c 'until docker inspect --format="{{.State.Health.Status}}" shell-app-ci 2>/dev/null | grep -q healthy; do sleep 2; done'
          echo "Shell app is healthy"

      - name: Wait for Browser Automation
        run: |
          echo "Waiting for Browser Automation to be healthy..."
          timeout 120 bash -c 'until docker inspect --format="{{.State.Health.Status}}" shell-automation-ci 2>/dev/null | grep -q healthy; do sleep 2; done'
          echo "Browser Automation is healthy"

      - name: Run visual regression tests
        run: |
          docker exec \
            -e UPDATE_BASELINES=false \
            -e GITHUB_RUN_ID=${{ github.run_id }} \
            -e GITHUB_RUN_NUMBER=${{ github.run_number }} \
            -e GITHUB_REPOSITORY=${{ github.repository }} \
            shell-automation-ci \
            node dist/tests/visual/shell-visual.test.js
        continue-on-error: true

      - name: Copy test results
        if: always()
        run: |
          docker cp shell-automation-ci:/app/temp/screenshots ./temp/screenshots 2>/dev/null || true
          docker cp shell-automation-ci:/app/temp/test-results ./temp/test-results 2>/dev/null || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-screenshots
          path: temp/screenshots/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: temp/test-results/
          retention-days: 14

      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentPath = './temp/test-results/github-pr-comment.md';
            if (fs.existsSync(commentPath)) {
              const body = fs.readFileSync(commentPath, 'utf-8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down --volumes --remove-orphans
