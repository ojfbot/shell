# Nginx Ingress — routes external traffic into the frame namespace.
# The shell is the only public entry point for users.
# Sub-app remoteEntry.js files are served via their own paths
# so the shell can load Module Federation modules across origins.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frame-ingress
  namespace: frame
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.jim.software"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    # Shell host — the Frame UI, primary user entry point
    - host: app.jim.software
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shell
                port: { number: 4000 }
          - path: /shell-api
            pathType: Prefix
            backend:
              service:
                name: shell-agent
                port: { number: 4001 }

    # Sub-app static assets + APIs
    # remoteEntry.js must be reachable from app.jim.software (CORS headers set above)
    - host: cv.jim.software
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: cv-builder, port: { number: 3000 } }
          - path: /api
            pathType: Prefix
            backend:
              service: { name: cv-builder-api, port: { number: 3001 } }

    - host: blog.jim.software
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: blogengine, port: { number: 3005 } }

    - host: trips.jim.software
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: tripplanner, port: { number: 3010 } }

    # Unified API — single Railway/fly.io backend serves all sub-apps
    - host: api.jim.software
      http:
        paths:
          - path: /cv
            pathType: Prefix
            backend:
              service: { name: cv-builder-api, port: { number: 3001 } }
          - path: /blog
            pathType: Prefix
            backend:
              service: { name: blogengine-api, port: { number: 3006 } }
          - path: /trips
            pathType: Prefix
            backend:
              service: { name: tripplanner-api, port: { number: 3011 } }

  tls:
    - hosts:
        - app.jim.software
        - cv.jim.software
        - blog.jim.software
        - trips.jim.software
        - api.jim.software
      secretName: jim-software-tls
