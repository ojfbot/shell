apiVersion: apps/v1
kind: Deployment
metadata:
  name: shell
  namespace: frame
  labels:
    app: shell
    app.kubernetes.io/part-of: frame
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shell
  template:
    metadata:
      labels:
        app: shell
    spec:
      containers:
        - name: shell-app
          image: ghcr.io/ojfbot/shell-app:latest
          ports:
            - containerPort: 4000
          env:
            # These resolve to K8s service DNS names within the cluster
            - name: VITE_REMOTE_CV_BUILDER
              value: "http://cv-builder.frame.svc.cluster.local:3000"
            - name: VITE_REMOTE_BLOGENGINE
              value: "http://blogengine.frame.svc.cluster.local:3005"
            - name: VITE_REMOTE_TRIPPLANNER
              value: "http://tripplanner.frame.svc.cluster.local:3010"
            - name: VITE_REMOTE_PUREFOY
              value: "http://purefoy.frame.svc.cluster.local:3020"
            - name: VITE_FRAME_AGENT_URL
              value: "http://frame-agent.frame.svc.cluster.local:4001"
          readinessProbe:
            httpGet: { path: /, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: shell
  namespace: frame
spec:
  selector:
    app: shell
  ports:
    - port: 4000
      targetPort: 4000
